auth_enabled: false

server:
  http_listen_port: 3100

common:
  path_prefix: .otel/loki-data
  storage:
    filesystem:
      chunks_directory: .otel/loki-data/chunks
      rules_directory: .otel/loki-data/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: "2024-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h
