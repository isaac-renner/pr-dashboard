receivers:
  otlp:
    protocols:
      http:
        endpoint: "0.0.0.0:4318"
        cors:
          allowed_origins: ["http://localhost:5173", "http://localhost:3333"]

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlphttp/tempo:
    endpoint: "http://localhost:3200"
    tls:
      insecure: true

  loki:
    endpoint: "http://localhost:3100/loki/api/v1/push"

  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "pr_dashboard"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/tempo]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
