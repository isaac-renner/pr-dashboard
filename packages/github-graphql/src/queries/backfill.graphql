query BackfillOpenPRs {
  authored: search(
    query: "author:@me state:open type:pr"
    type: ISSUE
    first: 100
  ) {
    nodes {
      ...PRFields
    }
  }
  assigned: search(
    query: "assignee:@me state:open type:pr"
    type: ISSUE
    first: 100
  ) {
    nodes {
      ...PRFields
    }
  }
}
